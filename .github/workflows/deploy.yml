name : Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
 deploy:
   runs-on: ubuntu-latest

   steps:
   - name: Checkout repository
     uses: actions/checkout@v4

   - name: Build deploy bundle
     run: |
       rm -rf .hf-deploy
       mkdir -p .hf-deploy/eval   

       cp app.py .hf-deploy/
       cp collect.py .hf-deploy/
       cp triage.py .hf-deploy/
       cp rag.py .hf-deploy/
       cp requirements.txt .hf-deploy/
       cp README.md .hf-deploy/

       cp eval/eval.py .hf-deploy/eval/
       cp eval/eval_dataset.json .hf-deploy/eval/
       cp eval/results.json .hf-deploy/eval/ 

   - name: Push to Hugging Face Space    
     env:
       HF_TOKEN: ${{ secrets.HF_TOKEN }}
     run: |
        cd .hf-deploy

        git init
        git config user.name  "github-actions"
        git config user.email "ci@github.com"

        git add -A
        git commit -m "Deploy to Hugging Face Space"

        HF_REMOTE="https://aiqualitylab:${HF_TOKEN}@huggingface.co/spaces/aiqualitylab/qa-bug-triage.git"

        git branch -M main
        git remote add hf "$HF_REMOTE"
        git push hf main --force
